<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widgets · Jihyun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root{
    --bg:#FCFAFB;
    --ink:#4A3F49;
    --soft:#7C707C;
    --faint:#B3A8B3;
    --line:#EFE6EE;
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg)}
  body{
    font-family:'Pretendard',system-ui,-apple-system,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;
    padding:46px 20px 60px;line-height:1.5;min-height:100vh;
  }
  .hub{max-width:720px;margin:0 auto}

  header{margin-bottom:32px}
  .eyebrow{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:#B08BAE;margin-bottom:10px}
  .eyebrow .sparkle{font-size:12px}
  h1{font-family:'Fredoka',system-ui,sans-serif;font-weight:600;font-size:44px;letter-spacing:-.01em;line-height:1;margin-bottom:13px}
  h1 em{font-style:normal;font-weight:600;color:#E29AC0;}
  .sub{font-size:14.5px;color:var(--soft);max-width:44ch}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:15px;margin-top:8px}

  .card{
    display:flex;flex-direction:column;text-decoration:none;color:inherit;
    background:var(--pastel);border:1px solid var(--edge);
    border-radius:var(--radius);padding:20px 20px 18px;min-height:174px;position:relative;
    transition:transform .18s ease,box-shadow .18s ease;overflow:hidden;
  }
  .card:hover{transform:translateY(-4px);box-shadow:0 18px 32px -18px var(--edge)}
  .card:focus-visible{outline:2.5px solid var(--deep);outline-offset:3px}
  .icon{width:46px;height:46px;color:var(--deep);margin-bottom:auto}
  .icon svg{width:100%;height:100%;display:block}
  .name{font-family:'Fredoka',system-ui,sans-serif;font-weight:500;font-size:20px;letter-spacing:0;margin-top:20px}
  .kr{font-size:12.5px;font-weight:600;color:var(--deep);opacity:.92;margin-top:3px}
  .desc{font-size:12.5px;color:var(--soft);margin-top:9px;line-height:1.45}
  .go{position:absolute;right:18px;bottom:16px;color:var(--deep);font-size:19px;line-height:1;transition:transform .18s ease;opacity:.75}
  .card:hover .go{transform:translateX(4px);opacity:1}

  .card:hover .spin{animation:spin 9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{transform-origin:24px 24px}

  .card.soon{
    background:transparent;border:1.5px dashed #E3D3E1;color:var(--faint);
    align-items:flex-start;justify-content:center;cursor:default;
  }
  .card.soon:hover{transform:none;box-shadow:none}
  .card.soon .plus{font-family:'Fredoka',system-ui,sans-serif;font-weight:500;font-size:30px;color:#CBAFC9;line-height:1}
  .card.soon .txt{font-size:12.5px;margin-top:8px}

  footer{margin-top:34px;font-size:12px;color:var(--faint)}
  footer b{font-weight:600;color:var(--soft)}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="hub">
  <header>
    <div class="eyebrow"><span class="sparkle">✦</span> Workspace</div>
    <h1>My <em>Widgets</em></h1>
    <p class="sub">직접 만든 작업 도구 모음. 필요한 걸 골라 들어가세요.</p>
  </header>

  <div class="grid">

    <a class="card" href="pomodoro.html" style="--pastel:#BCDCF0;--deep:#4A78A8;--edge:rgba(74,120,168,.32)">
      <div class="icon">
        <svg viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="16" stroke="currentColor" stroke-opacity=".28" stroke-width="3"/>
          <path class="spin" d="M24 8a16 16 0 0 1 13.86 24" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <circle cx="24" cy="24" r="2.6" fill="currentColor"/>
        </svg>
      </div>
      <div class="name">Pomodoro</div>
      <div class="kr">뽀모도로 타이머</div>
      <div class="desc">집중·휴식 타이머와 태스크·토마토 트래킹</div>
      <span class="go">→</span>
    </a>

    <a class="card" href="routine.html" style="--pastel:#CBC3F0;--deep:#6A5C9E;--edge:rgba(106,92,158,.3)">
      <div class="icon">
        <svg viewBox="0 0 48 48" fill="none">
          <rect x="6" y="9" width="36" height="31" rx="4" stroke="currentColor" stroke-opacity=".3" stroke-width="2"/>
          <line x1="15" y1="9" x2="15" y2="40" stroke="currentColor" stroke-opacity=".22" stroke-width="1.5"/>
          <line x1="24" y1="9" x2="24" y2="40" stroke="currentColor" stroke-opacity=".22" stroke-width="1.5"/>
          <line x1="33" y1="9" x2="33" y2="40" stroke="currentColor" stroke-opacity=".22" stroke-width="1.5"/>
          <rect x="8.5" y="14" width="4" height="9" rx="1.5" fill="currentColor" fill-opacity=".8"/>
          <rect x="17.5" y="20" width="4" height="12" rx="1.5" fill="currentColor" fill-opacity=".8"/>
          <rect x="26.5" y="16" width="4" height="7" rx="1.5" fill="currentColor" fill-opacity=".8"/>
          <rect x="35" y="24" width="4" height="10" rx="1.5" fill="currentColor" fill-opacity=".8"/>
        </svg>
      </div>
      <div class="name">Weekly Routine</div>
      <div class="kr">주간 루틴</div>
      <div class="desc">요일별 시간 블록으로 한 주 설계</div>
      <span class="go">→</span>
    </a>

    <a class="card" href="todo.html" style="--pastel:#F5C4D6;--deep:#C56590;--edge:rgba(197,101,144,.3)">
      <div class="icon">
        <svg viewBox="0 0 48 48" fill="none">
          <rect x="8" y="11" width="9" height="9" rx="2.5" fill="currentColor" fill-opacity=".85"/>
          <path d="M10.5 15.5l2 2 3.5-4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="21" y1="15.5" x2="40" y2="15.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          <rect x="8" y="25" width="9" height="9" rx="2.5" stroke="currentColor" stroke-opacity=".45" stroke-width="2"/>
          <line x1="21" y1="29.5" x2="40" y2="29.5" stroke="currentColor" stroke-opacity=".5" stroke-width="2.4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="name">To-Do</div>
      <div class="kr">할 일 · 우선순위</div>
      <div class="desc">프로젝트별 우선순위 스택 + 마감일(D-day)</div>
      <span class="go">→</span>
    </a>

    <div class="card soon">
      <span class="plus">+</span>
      <span class="txt">다음 위젯 자리</span>
    </div>

  </div>

  <footer>모든 위젯은 <b>이 브라우저에 저장</b>돼요 (인터넷 안 씀). Notion엔 원하는 위젯 주소를 <b>/embed</b> 하면 됩니다.</footer>
</div>
</body>
</html>
