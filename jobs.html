<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>잡마켓 트래커</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap');
  :root{
    --paper:#FCFAFB; --surface:#fff; --ink:#4A3F49; --soft:#7C707C; --faint:#B3A8B3;
    --rule:#EFE6EE; --rule2:#E4D8E2; --radius:14px; --accent:#C56590;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--paper);}
  body{font-family:'Pretendard',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;padding:16px;}

  .wnav{max-width:1180px;margin:0 auto 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    background:#fff;border:1px solid #EFE6EE;border-radius:12px;padding:6px;
    box-shadow:0 8px 22px -18px rgba(126,80,120,.35);}
  .wnav a{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:13px;font-weight:600;color:#7C707C;padding:7px 12px;border-radius:8px;transition:background .14s,color .14s;line-height:1;}
  .wnav a:hover{background:#FBF3F8;color:#4A3F49;}
  .wnav a.icon-only{padding:7px 9px;}
  .wnav .sp{flex:1;}
  .wnav a[aria-current="page"]{background:#F5C4D6;color:#4A3F49;}
  .wnav .ico{display:inline-flex;align-items:center}
  .wnav .ico svg{width:16px;height:16px;display:block}
  @media(max-width:560px){.wnav .lbl{display:none}}

  .wrap{max-width:1180px;margin:0 auto;background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius);overflow:hidden;box-shadow:0 12px 30px -22px rgba(126,80,120,.32);}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:16px 20px 12px;border-bottom:1px solid var(--rule);}
  .title{font-family:'Fredoka',sans-serif;font-weight:500;font-size:22px;margin:0;}
  .toolbar{display:flex;gap:6px;flex-wrap:wrap;}
  button.tb{font:inherit;font-size:12.5px;font-weight:500;color:var(--soft);background:var(--surface);border:1px solid var(--rule2);border-radius:9px;padding:6px 11px;cursor:pointer;transition:background .15s,border-color .15s;}
  button.tb:hover{background:var(--paper);border-color:var(--faint);}
  button.tb.primary{color:#fff;background:var(--accent);border-color:var(--accent);}
  button.tb.primary:hover{background:#B0547E;}

  .scroll{overflow-x:auto;padding:16px 20px 20px;}
  .board{display:flex;gap:12px;min-width:min-content;}
  .col{flex:0 0 228px;display:flex;flex-direction:column;}
  .col-head{display:flex;align-items:center;gap:7px;padding:2px 4px 9px;font-size:12.5px;font-weight:600;color:var(--soft);}
  .col-head .dot{width:9px;height:9px;border-radius:3px;flex:none;}
  .col-head .cnt{margin-left:auto;font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums;}
  .cards{display:flex;flex-direction:column;gap:8px;background:var(--paper);border:1px solid var(--rule);border-radius:11px;padding:9px;min-height:80px;flex:1;}
  .jcard{background:var(--tint);border:1px solid var(--edge);border-left:3px solid var(--c);border-radius:9px;padding:10px 11px;cursor:pointer;transition:transform .1s,box-shadow .12s;}
  .jcard:hover{transform:translateY(-1px);box-shadow:0 8px 16px -11px rgba(126,80,120,.5);}
  .jt{font-size:13.5px;font-weight:600;line-height:1.3;color:var(--ink);}
  .jpos{font-size:11.5px;color:var(--soft);margin-top:3px;}
  .jfoot{display:flex;align-items:center;gap:6px;margin-top:9px;flex-wrap:wrap;}
  .badge{font-size:10.5px;font-weight:700;font-variant-numeric:tabular-nums;padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.65);color:var(--soft);}
  .badge.over{color:#B0547E;background:rgba(255,255,255,.85);}
  .badge.soon{color:#B07A2E;background:rgba(255,255,255,.85);}
  .mats{font-size:10.5px;color:var(--faint);background:rgba(255,255,255,.6);border-radius:5px;padding:2px 6px;}
  .mats.full{color:#4E8A72;}
  .mvwrap{margin-left:auto;display:flex;gap:3px;}
  .mv{width:24px;height:24px;border:1px solid var(--rule2);background:#fff;color:var(--soft);border-radius:6px;cursor:pointer;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;}
  .mv:hover{background:var(--paper);color:var(--ink);}
  .mv:disabled{opacity:.3;cursor:default;}
  .colempty{font-size:11.5px;color:var(--faint);text-align:center;padding:14px 0;}

  .modal-bg{position:fixed;inset:0;background:rgba(74,63,73,.4);display:none;align-items:flex-start;justify-content:center;padding:24px 16px;z-index:50;overflow:auto;-webkit-overflow-scrolling:touch;}
  .modal-bg.on{display:flex;}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:410px;padding:18px 20px 20px;box-shadow:0 24px 60px -20px rgba(0,0,0,.4);}
  .modal h3{margin:0 0 14px;font-family:'Fredoka',sans-serif;font-weight:500;font-size:17px;}
  .field{margin-bottom:11px;}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--soft);margin-bottom:4px;}
  .field input,.field select,.field textarea{width:100%;font:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--rule2);border-radius:8px;background:var(--surface);color:var(--ink);resize:vertical;}
  .field textarea{min-height:48px;line-height:1.4;}
  .row2{display:flex;gap:8px;} .row2>*{flex:1;}
  .matgrid{display:flex;flex-wrap:wrap;gap:6px;}
  .matchip{font:inherit;font-size:11.5px;font-weight:600;color:var(--soft);background:var(--surface);border:1px solid var(--rule2);border-radius:999px;padding:6px 11px;cursor:pointer;transition:.13s;user-select:none;}
  .matchip.on{background:#EAF4EE;border-color:#BFE0CE;color:#4E8A72;}
  .matchip.on::before{content:"✓ ";}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .modal-actions button{flex:1;font:inherit;font-size:13px;font-weight:500;padding:9px;border-radius:9px;cursor:pointer;border:1px solid var(--rule2);background:var(--surface);color:var(--soft);}
  .modal-actions .save{background:var(--accent);color:#fff;border-color:var(--accent);}
  .modal-actions .del{background:#fff;color:#C85C7A;border-color:#ecc6d5;margin-right:auto;flex:0 0 auto;padding:9px 12px;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<nav class="wnav">
  <a class="home icon-only" href="index.html" title="홈"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg></span></a>
  <a class="icon-only" href="dashboard.html" title="대시보드"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg></span></a>
  <span class="sp"></span>
  <a href="pomodoro.html"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 1.8"/></svg></span><span class="lbl">뽀모도로</span></a>
  <a href="routine.html"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M4 9.5h16"/><path d="M8.5 3v4"/><path d="M15.5 3v4"/></svg></span><span class="lbl">루틴</span></a>
  <a href="todo.html"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l2.5 2.5L21 4.5"/><path d="M20.5 12.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h10.5"/></svg></span><span class="lbl">할 일</span></a>
  <a href="papers.html"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3H6a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9z"/><path d="M13 3v6h6"/><path d="M8.5 13.5h7"/><path d="M8.5 17h7"/></svg></span><span class="lbl">논문</span></a>
  <a href="jobs.html" aria-current="page"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M3 12h18"/></svg></span><span class="lbl">잡마켓</span></a>
</nav>

<div class="wrap" style="position:relative;">
  <header class="top">
    <h1 class="title">Job Market</h1>
    <div class="toolbar">
      <button class="tb primary" id="addBtn">+ 지원처 추가</button>
      <button class="tb" id="expBtn">내보내기</button>
      <button class="tb" id="impBtn">가져오기</button>
    </div>
  </header>
  <div class="scroll"><div class="board" id="board"></div></div>

  <div class="modal-bg" id="jModal">
    <div class="modal">
      <h3 id="jmTitle">지원처 추가</h3>
      <div class="field"><label>기관</label><input id="f-inst" type="text" placeholder="예: OO 주립대 / OO 바이오"/></div>
      <div class="field"><label>포지션</label><input id="f-pos" type="text" placeholder="예: Assistant Professor (Biostatistics)"/></div>
      <div class="row2">
        <div class="field"><label>마감일</label><input id="f-deadline" type="date"/></div>
        <div class="field"><label>상태</label><select id="f-status"></select></div>
      </div>
      <div class="field"><label>서류 준비</label><div class="matgrid" id="f-mats"></div></div>
      <div class="field"><label>링크</label><input id="f-link" type="url" placeholder="공고 URL (선택)"/></div>
      <div class="field"><label>메모</label><textarea id="f-note" placeholder="연락처·다음 할 일·인터뷰 일정 등"></textarea></div>
      <div class="modal-actions">
        <button class="del" id="jmDel">삭제</button>
        <button id="jmCancel">취소</button>
        <button class="save" id="jmSave">저장</button>
      </div>
    </div>
  </div>
</div>

<script>
const KEY='job_market_v1';
const STATUSES=[
  {id:'interested',name:'관심',      color:'#F5C4D6'},
  {id:'preparing', name:'준비 중',   color:'#F8CBC4'},
  {id:'applied',   name:'지원 완료', color:'#F6E7B4'},
  {id:'interview', name:'인터뷰',    color:'#BCDCF0'},
  {id:'offer',     name:'오퍼',      color:'#C6E6D6'},
  {id:'closed',    name:'탈락 / 보류',color:'#D8CEDA'},
];
const MATS=[
  {k:'cover',n:'Cover Letter'},{k:'cv',n:'CV'},{k:'research',n:'Research Stmt'},
  {k:'teaching',n:'Teaching Stmt'},{k:'diversity',n:'Diversity Stmt'},{k:'refs',n:'References'},
];
const now=Date.now();
const DEFAULT={jobs:[
  {id:'j1',inst:'(예시) 주립대 — Biostatistics',pos:'Assistant Professor (tenure-track)',deadline:'2026-11-15',status:'interested',mats:{cv:true},link:'',note:'예시입니다 — 수정하거나 삭제하세요',moved:now},
  {id:'j2',inst:'(예시) 제약/바이오 회사',pos:'Biostatistician',deadline:'',status:'preparing',mats:{cv:true,cover:true},link:'',note:'산업 트랙 예시',moved:now},
]};

let state=load();
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&Array.isArray(s.jobs))return s;}catch(e){}return structuredClone(DEFAULT);}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
const $=id=>document.getElementById(id);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function esc(s){return(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function sIdx(id){return STATUSES.findIndex(s=>s.id===id);}
function rgba(hex,a){const h=hex.replace('#','');return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}
function ddInfo(due){const t=new Date();t.setHours(0,0,0,0);const diff=Math.round((new Date(due+'T00:00:00')-t)/86400000);
  if(diff===0)return{l:'D-DAY',c:'soon'};if(diff>0)return{l:'D-'+diff,c:diff<=5?'soon':''};return{l:'D+'+(-diff),c:'over'};}
function matCount(m){return MATS.reduce((a,x)=>a+(m&&m[x.k]?1:0),0);}

const board=$('board');
function render(){
  board.innerHTML='';
  STATUSES.forEach(st=>{
    const col=document.createElement('div');col.className='col';
    const items=state.jobs.filter(j=>j.status===st.id);
    const head=document.createElement('div');head.className='col-head';
    head.innerHTML=`<span class="dot" style="background:${st.color}"></span>${st.name}<span class="cnt">${items.length}</span>`;
    col.appendChild(head);
    const cards=document.createElement('div');cards.className='cards';
    if(!items.length)cards.innerHTML='<div class="colempty">—</div>';
    items.forEach(j=>{
      const idx=sIdx(j.status);
      const showDl=j.deadline && !['offer','closed'].includes(j.status);
      const dd=showDl?ddInfo(j.deadline):null;
      const mc=matCount(j.mats);
      const card=document.createElement('div');card.className='jcard';
      card.style.setProperty('--c',st.color);
      card.style.setProperty('--tint',rgba(st.color,0.18));
      card.style.setProperty('--edge',rgba(st.color,0.4));
      card.innerHTML=`
        <div class="jt">${esc(j.inst)}</div>
        ${j.pos?`<div class="jpos">${esc(j.pos)}</div>`:''}
        <div class="jfoot">
          ${dd?`<span class="badge ${dd.c}">${dd.l}</span>`:''}
          <span class="mats${mc===MATS.length?' full':''}">서류 ${mc}/${MATS.length}</span>
          <span class="mvwrap">
            <button class="mv prev" title="이전 상태" ${idx<=0?'disabled':''}>‹</button>
            <button class="mv next" title="다음 상태" ${idx>=STATUSES.length-1?'disabled':''}>›</button>
          </span>
        </div>`;
      card.onclick=()=>openJob(j.id);
      card.querySelector('.prev').onclick=e=>{e.stopPropagation();moveStatus(j.id,-1);};
      card.querySelector('.next').onclick=e=>{e.stopPropagation();moveStatus(j.id,1);};
      cards.appendChild(card);
    });
    col.appendChild(cards);
    board.appendChild(col);
  });
}
function moveStatus(id,dir){const j=state.jobs.find(x=>x.id===id);if(!j)return;const i=sIdx(j.status)+dir;if(i<0||i>=STATUSES.length)return;j.status=STATUSES[i].id;j.moved=Date.now();save();render();}

const jm=$('jModal');let editId=null,matState={};
function fillStatus(){const s=$('f-status');s.innerHTML='';STATUSES.forEach(st=>{const o=document.createElement('option');o.value=st.id;o.textContent=st.name;s.appendChild(o);});}
function renderMats(){const w=$('f-mats');w.innerHTML='';MATS.forEach(m=>{const b=document.createElement('div');b.className='matchip'+(matState[m.k]?' on':'');b.textContent=m.n;b.onclick=()=>{matState[m.k]=!matState[m.k];renderMats();};w.appendChild(b);});}
function openJob(id){editId=id;fillStatus();const j=state.jobs.find(x=>x.id===id);matState=Object.assign({},j.mats||{});
  $('jmTitle').textContent='지원처 수정';
  $('f-inst').value=j.inst;$('f-pos').value=j.pos||'';$('f-deadline').value=j.deadline||'';
  $('f-status').value=j.status;$('f-link').value=j.link||'';$('f-note').value=j.note||'';
  renderMats();$('jmDel').style.display='';jm.classList.add('on');}
$('addBtn').onclick=()=>{editId=null;fillStatus();matState={};
  $('jmTitle').textContent='지원처 추가';$('f-inst').value='';$('f-pos').value='';$('f-deadline').value='';
  $('f-status').selectedIndex=0;$('f-link').value='';$('f-note').value='';renderMats();$('jmDel').style.display='none';jm.classList.add('on');};
$('jmCancel').onclick=()=>jm.classList.remove('on');
$('jmDel').onclick=()=>{if(editId!=null){state.jobs=state.jobs.filter(j=>j.id!==editId);save();render();}jm.classList.remove('on');};
$('jmSave').onclick=()=>{
  const inst=$('f-inst').value.trim();if(!inst){alert('기관을 입력하세요.');return;}
  const pos=$('f-pos').value.trim(),deadline=$('f-deadline').value,status=$('f-status').value,link=$('f-link').value.trim(),note=$('f-note').value.trim();
  const mats=Object.assign({},matState);
  if(editId!=null){const j=state.jobs.find(x=>x.id===editId);if(j.status!==status)j.moved=Date.now();
    Object.assign(j,{inst,pos,deadline,status,link,note,mats});}
  else state.jobs.push({id:uid(),inst,pos,deadline,status,link,note,mats,moved:Date.now()});
  save();render();jm.classList.remove('on');};
jm.addEventListener('click',e=>{if(e.target===jm)jm.classList.remove('on');});

$('expBtn').onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='job_market.json';a.click();URL.revokeObjectURL(a.href);};
$('impBtn').onclick=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const s=JSON.parse(r.result);if(Array.isArray(s.jobs)){state=s;save();render();}else alert('형식이 맞지 않아요.');}catch(err){alert('읽을 수 없는 파일이에요.');}};r.readAsText(f);};
  inp.click();};

render();
</script>
</body>
</html>
