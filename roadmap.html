<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>목표 로드맵</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap');
  :root{--paper:#FCFAFB;--surface:#fff;--ink:#4A3F49;--soft:#7C707C;--faint:#B3A8B3;--rule:#EFE6EE;--rule2:#E4D8E2;--radius:14px;--accent:#C56590;}
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--paper);}
  body{font-family:'Pretendard',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;padding:16px;}
    .wnav{flex-wrap:wrap;max-width:1180px;margin:0 auto 12px;display:flex;align-items:center;gap:6px;
    background:#fff;border:1px solid #EFE6EE;border-radius:12px;padding:6px;
    box-shadow:0 8px 22px -18px rgba(126,80,120,.35);}
  .wnav a{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:13px;font-weight:600;color:#7C707C;padding:7px 12px;border-radius:8px;transition:background .14s,color .14s;line-height:1;}
  .wnav a:hover{background:#FBF3F8;color:#4A3F49;}
  .wnav a.icon-only{padding:7px 9px;}
  .wnav .sp{flex:1;}
  .wnav a[aria-current="page"]{background:#F5C4D6;color:#4A3F49;}
  .wnav .ico{display:inline-flex;align-items:center}
  .wnav .ico svg{width:16px;height:16px;display:block}
  .wnav .lbl{display:none}
  .wrap{max-width:760px;margin:0 auto;background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius);overflow:hidden;box-shadow:0 12px 30px -22px rgba(126,80,120,.32);}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:16px 20px 12px;border-bottom:1px solid var(--rule);}
  .title{font-family:'Fredoka',sans-serif;font-weight:500;font-size:22px;margin:0;}
  .toolbar{display:flex;gap:6px;flex-wrap:wrap;}
  button.tb{font:inherit;font-size:12.5px;font-weight:500;color:var(--soft);background:var(--surface);border:1px solid var(--rule2);border-radius:9px;padding:6px 11px;cursor:pointer;}
  button.tb:hover{background:var(--paper);border-color:var(--faint);}
  button.tb.primary{color:#fff;background:var(--accent);border-color:var(--accent);}
  button.tb.primary:hover{background:#B0547E;}
  .goals{padding:16px 20px 22px;display:flex;flex-direction:column;gap:14px;}
  .goal{border:1px solid var(--edge);border-left:4px solid var(--c);border-radius:12px;background:var(--tint);padding:14px 16px;}
  .ghead{display:flex;align-items:center;gap:10px;}
  .gname{font-size:15px;font-weight:600;color:var(--ink);flex:1;}
  .gpct{font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;color:var(--ink);}
  .gedit{color:var(--faint);cursor:pointer;font-size:13px;padding:3px 6px;border-radius:6px;}
  .gedit:hover{background:rgba(255,255,255,.6);color:var(--ink);}
  .gbar{height:8px;border-radius:999px;background:rgba(255,255,255,.65);overflow:hidden;margin:9px 0 12px;}
  .gbar span{display:block;height:100%;background:var(--c);transition:width .3s;}
  .ms{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:13px;}
  .ms .chk{width:18px;height:18px;border-radius:6px;border:1.5px solid var(--rule2);flex:none;cursor:pointer;background:#fff;position:relative;}
  .ms .chk.on{background:var(--c);border-color:var(--c);}
  .ms .chk.on::after{content:"";position:absolute;left:5px;top:2px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);}
  .ms .mn{flex:1;}
  .ms.done .mn{text-decoration:line-through;color:var(--faint);}
  .ms .md{font-size:10.5px;color:var(--faint);white-space:nowrap;}
  .ms .mx{color:var(--faint);cursor:pointer;font-size:15px;padding:0 3px;opacity:0;}
  .ms:hover .mx{opacity:1;}
  .ms .mx:hover{color:#C85C7A;}
  .addms{display:flex;gap:6px;margin-top:8px;}
  .addms input{flex:1;font:inherit;font-size:12.5px;padding:6px 9px;border:1px solid var(--rule2);border-radius:8px;background:rgba(255,255,255,.7);}
  .addms input.dt{flex:0 0 130px;}
  .addms button{font:inherit;font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:8px;background:#fff;border:1px solid var(--rule2);color:var(--soft);cursor:pointer;}
  .addms button:hover{color:var(--ink);}
  .empty{text-align:center;color:var(--faint);font-size:13px;padding:22px 0;}
  .modal-bg{position:fixed;inset:0;background:rgba(74,63,73,.4);display:none;align-items:flex-start;justify-content:center;padding:24px 16px;z-index:50;overflow:auto;-webkit-overflow-scrolling:touch;}
  .modal-bg.on{display:flex;}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:360px;padding:18px 20px 20px;box-shadow:0 24px 60px -20px rgba(0,0,0,.4);}
  .modal h3{margin:0 0 14px;font-family:'Fredoka',sans-serif;font-weight:500;font-size:17px;}
  .field{margin-bottom:11px;}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--soft);margin-bottom:4px;}
  .field input{width:100%;font:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--rule2);border-radius:8px;background:var(--surface);color:var(--ink);}
  .sw{display:flex;gap:7px;flex-wrap:wrap;}
  .sw span{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .sw span.sel{border-color:var(--ink);transform:scale(1.08);}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .modal-actions button{flex:1;font:inherit;font-size:13px;font-weight:500;padding:9px;border-radius:9px;cursor:pointer;border:1px solid var(--rule2);background:var(--surface);color:var(--soft);}
  .modal-actions .save{background:var(--accent);color:#fff;border-color:var(--accent);}
  .modal-actions .del{background:#fff;color:#C85C7A;border-color:#ecc6d5;margin-right:auto;flex:0 0 auto;padding:9px 12px;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<nav class="wnav">
  <a class="home icon-only" href="index.html" title="홈"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg></span></a>
  <a class="icon-only" href="dashboard.html" title="대시보드"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg></span></a>
  <span class="sp"></span>
  <a href="pomodoro.html" title="뽀모도로"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 1.8"/></svg></span><span class="lbl">뽀모도로</span></a>
  <a href="routine.html" title="루틴"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M4 9.5h16"/><path d="M8.5 3v4"/><path d="M15.5 3v4"/></svg></span><span class="lbl">루틴</span></a>
  <a href="todo.html" title="할 일"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l2.5 2.5L21 4.5"/><path d="M20.5 12.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h10.5"/></svg></span><span class="lbl">할 일</span></a>
  <a href="papers.html" title="논문"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3H6a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9z"/><path d="M13 3v6h6"/><path d="M8.5 13.5h7"/><path d="M8.5 17h7"/></svg></span><span class="lbl">논문</span></a>
  <a href="jobs.html" title="잡마켓"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M3 12h18"/></svg></span><span class="lbl">잡마켓</span></a>
  <a href="countdown.html" title="마감 카운트다운"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="7.5"/><path d="M12 9.5V13l2.5 1.6"/><path d="M9.5 2.5h5"/></svg></span><span class="lbl">카운트다운</span></a>
  <a href="roadmap.html" title="로드맵" aria-current="page"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1"/></svg></span><span class="lbl">로드맵</span></a>
  <a href="daily.html" title="데일리"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.5"/><path d="M12 19v2.5"/><path d="M4.5 12H2"/><path d="M22 12h-2.5"/><path d="M5.5 5.5l1.7 1.7"/><path d="M16.8 16.8l1.7 1.7"/><path d="M5.5 18.5l1.7-1.7"/><path d="M16.8 7.2l1.7-1.7"/></svg></span><span class="lbl">데일리</span></a>
</nav>
<div class="wrap" style="position:relative;">
  <header class="top">
    <h1 class="title">Roadmap</h1>
    <div class="toolbar">
      <button class="tb primary" id="addBtn">+ 목표 추가</button>
      <button class="tb" id="expBtn">내보내기</button>
      <button class="tb" id="impBtn">가져오기</button>
    </div>
  </header>
  <div class="goals" id="goals"></div>

  <div class="modal-bg" id="gModal">
    <div class="modal">
      <h3 id="gmTitle">목표 추가</h3>
      <div class="field"><label>목표 이름</label><input id="f-name" type="text" placeholder="예: 논문 3편 게재"/></div>
      <div class="field"><label>색</label><div class="sw" id="f-sw"></div></div>
      <div class="modal-actions"><button class="del" id="gmDel">삭제</button><button id="gmCancel">취소</button><button class="save" id="gmSave">저장</button></div>
    </div>
  </div>
</div>
<script>
const KEY='goal_roadmap_v1';
const PALETTE=["#F5C4D6","#BCDCF0","#CBC3F0","#C6E6D6","#F8CBC4","#EAC6E6"];
const DEFAULT={goals:[
  {id:'g1',name:'논문 게재 (2026–2027)',color:'#F5C4D6',ms:[
    {id:'m1',name:'클러스터링 매니스크립트 제출',date:'',done:false},
    {id:'m2',name:'Paper 1 제출',date:'',done:false},
    {id:'m3',name:'Paper 2 (ECM) 제출',date:'',done:false},
    {id:'m4',name:'Biometrics revision 완료',date:'',done:false},
  ]},
  {id:'g2',name:'잡마켓 (2026–2027)',color:'#C6E6D6',ms:[
    {id:'m5',name:'서류 세트 완성 (CV·statements)',date:'',done:false},
    {id:'m6',name:'1차 지원 제출',date:'',done:false},
    {id:'m7',name:'인터뷰',date:'',done:false},
    {id:'m8',name:'오퍼 결정',date:'',done:false},
  ]},
  {id:'g3',name:'학회 발표',color:'#BCDCF0',ms:[
    {id:'m9',name:'ENAR 2027 초록 제출',date:'',done:false},
    {id:'m10',name:'JSM 2026 발표',date:'',done:false},
  ]},
]};
let state=load();
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&Array.isArray(s.goals))return s;}catch(e){}return structuredClone(DEFAULT);}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
const $=id=>document.getElementById(id);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function esc(s){return(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function rgba(hex,a){const h=hex.replace('#','');return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}
function fmtD(d){if(!d)return '';const dt=new Date(d+'T00:00:00');return `${dt.getMonth()+1}/${dt.getDate()}`;}

const wrapG=$('goals');
function render(){
  wrapG.innerHTML='';
  if(!state.goals.length){wrapG.innerHTML='<div class="empty">목표 없음. + 로 추가하세요.</div>';return;}
  state.goals.forEach(g=>{
    const total=g.ms.length,done=g.ms.filter(m=>m.done).length;
    const pct=total?Math.round(done/total*100):0;
    const el=document.createElement('div');el.className='goal';
    el.style.setProperty('--c',g.color);el.style.setProperty('--tint',rgba(g.color,0.14));el.style.setProperty('--edge',rgba(g.color,0.4));
    el.innerHTML=`
      <div class="ghead"><span class="gname">${esc(g.name)}</span><span class="gpct">${pct}%</span><span class="gedit" title="목표 수정">✎</span></div>
      <div class="gbar"><span style="width:${pct}%"></span></div>
      <div class="mslist"></div>
      <div class="addms"><input class="mname" type="text" placeholder="마일스톤 추가" maxlength="80"><input class="dt" type="date"><button class="addbtn">추가</button></div>`;
    const list=el.querySelector('.mslist');
    g.ms.forEach(m=>{
      const row=document.createElement('div');row.className='ms'+(m.done?' done':'');
      row.innerHTML=`<span class="chk ${m.done?'on':''}"></span><span class="mn">${esc(m.name)}</span>${m.date?`<span class="md">${fmtD(m.date)}</span>`:''}<span class="mx" title="삭제">×</span>`;
      row.querySelector('.chk').onclick=()=>{m.done=!m.done;save();render();};
      row.querySelector('.mx').onclick=()=>{g.ms=g.ms.filter(x=>x.id!==m.id);save();render();};
      list.appendChild(row);
    });
    el.querySelector('.gedit').onclick=()=>openGoal(g.id);
    const mi=el.querySelector('.mname'),di=el.querySelector('.dt');
    const addMs=()=>{const v=mi.value.trim();if(!v)return;g.ms.push({id:uid(),name:v,date:di.value||'',done:false});save();render();};
    el.querySelector('.addbtn').onclick=addMs;
    mi.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.isComposing)addMs();});
    wrapG.appendChild(el);
  });
}
const gm=$('gModal');let editId=null,pickColor=PALETTE[0];
function renderSw(){const w=$('f-sw');w.innerHTML='';PALETTE.forEach(c=>{const s=document.createElement('span');s.style.background=c;if(c===pickColor)s.className='sel';s.onclick=()=>{pickColor=c;renderSw();};w.appendChild(s);});}
function openGoal(id){editId=id;const g=state.goals.find(x=>x.id===id);pickColor=g.color;$('gmTitle').textContent='목표 수정';$('f-name').value=g.name;renderSw();$('gmDel').style.display='';gm.classList.add('on');}
$('addBtn').onclick=()=>{editId=null;pickColor=PALETTE[0];$('gmTitle').textContent='목표 추가';$('f-name').value='';renderSw();$('gmDel').style.display='none';gm.classList.add('on');};
$('gmCancel').onclick=()=>gm.classList.remove('on');
$('gmDel').onclick=()=>{if(editId!=null){state.goals=state.goals.filter(x=>x.id!==editId);save();render();}gm.classList.remove('on');};
$('gmSave').onclick=()=>{const name=$('f-name').value.trim();if(!name){alert('목표 이름을 입력하세요.');return;}
  if(editId!=null)Object.assign(state.goals.find(x=>x.id===editId),{name,color:pickColor});
  else state.goals.push({id:uid(),name,color:pickColor,ms:[]});
  save();render();gm.classList.remove('on');};
gm.addEventListener('click',e=>{if(e.target===gm)gm.classList.remove('on');});
$('expBtn').onclick=()=>{const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='goal_roadmap.json';a.click();URL.revokeObjectURL(a.href);};
$('impBtn').onclick=()=>{const i=document.createElement('input');i.type='file';i.accept='.json,application/json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const s=JSON.parse(r.result);if(Array.isArray(s.goals)){state=s;save();render();}else alert('형식이 맞지 않아요.');}catch(err){alert('읽을 수 없는 파일이에요.');}};r.readAsText(f);};i.click();};
render();
</script>
</body>
</html>
